# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - trady-platform

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: npm install and build
        working-directory: frontend
        env:
          DATABASE_URL: "file:./dev.db"
        run: |
          npm install
          npx prisma generate
          npx prisma db push --accept-data-loss
          npm run build

      - name: Prepare standalone deployment
        working-directory: frontend
        run: |
          cp -r .next/standalone standalone
          cp -r .next/static standalone/.next/static
          cp -r public standalone/public
          cp prisma/schema.prisma standalone/prisma/schema.prisma
          cp dev.db standalone/dev.db 2>/dev/null || true

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: frontend/standalone

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A59AFD847C8344EBB344FA637F0F3EFC }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F74F3A9228764251838208707D32544E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_084CDFD4F5C34890A1151159CA1278D5 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'trady-platform'
          slot-name: 'Production'
          package: .
