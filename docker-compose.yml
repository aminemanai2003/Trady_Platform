version: "3.8"

services:
  # Reuse existing databases from Data Acquisition
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: forex_metadata
      POSTGRES_USER: dataminds
      POSTGRES_PASSWORD: dataminds_secure_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../Data Acquisition/init.sql:/docker-entrypoint-initdb.d/init.sql

  influxdb:
    image: influxdb:2.7
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminpassword
      DOCKER_INFLUXDB_INIT_ORG: forex_org
      DOCKER_INFLUXDB_INIT_BUCKET: forex_data
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: my-super-secret-token
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  influxdb_data:
